<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Kas Kelas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --paper:#FAF6EC;
    --paper-line:#E4DCC6;
    --ink:#1F2A24;
    --ink-soft:#4A5248;
    --muted:#8A8371;
    --green:#2F5233;
    --green-dark:#1D3620;
    --green-tint:#E7EEE4;
    --gold:#B8912F;
    --gold-tint:#F7EFD9;
    --blue:#2B5F8A;
    --blue-tint:#E7EEF3;
    --red:#A63D40;
    --red-tint:#F5E7E3;
    --card:#FFFFFF;
    --shadow: 0 1px 2px rgba(31,42,36,0.06), 0 4px 14px rgba(31,42,36,0.05);
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
  }
  .num{font-family:'IBM Plex Mono',monospace; font-variant-numeric: tabular-nums;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}

  #app{display:flex; min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:232px; flex-shrink:0;
    background: linear-gradient(180deg,var(--green) 0%, var(--green-dark) 100%);
    color:#EFE9D8;
    display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
  }
  .brand{
    padding:26px 22px 18px 22px;
    border-bottom:1px solid rgba(239,233,216,0.14);
  }
  .brand .mark{
    width:38px;height:38px;border-radius:8px;
    background:var(--gold); color:var(--green-dark);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; font-size:18px;
    margin-bottom:10px;
  }
  .brand h1{font-size:19px; margin:0 0 2px 0; font-weight:600; letter-spacing:0.2px;}
  .brand p{margin:0; font-size:11.5px; color:#C7CCB8; letter-spacing:0.3px;}

  nav{padding:14px 12px; flex:1;}
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding:10px 12px; border-radius:8px; margin-bottom:2px;
    color:#DCE3D2; font-size:14px; font-weight:500; cursor:pointer;
    border:none; background:transparent; width:100%; text-align:left;
    transition:background .15s ease, color .15s ease;
  }
  .nav-item svg{width:17px;height:17px; flex-shrink:0; opacity:0.85;}
  .nav-item:hover{background:rgba(239,233,216,0.08); color:#fff;}
  .nav-item.active{background:rgba(239,233,216,0.16); color:#fff;}
  .nav-item.active svg{opacity:1;}
  .nav-sep{height:1px; background:rgba(239,233,216,0.12); margin:10px 8px;}

  .sidebar-foot{padding:14px 22px 18px; font-size:11px; color:#9FA98C; border-top:1px solid rgba(239,233,216,0.1);}

  /* Main */
  main{flex:1; min-width:0; padding:32px 40px 60px; background-image: repeating-linear-gradient(to bottom, transparent, transparent 41px, var(--paper-line) 42px); background-position: 0 110px;}
  .page{max-width:1100px; margin:0 auto;}
  .page-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:26px;}
  .page-head h2{font-size:26px; margin:0 0 4px; font-weight:600;}
  .page-head .sub{color:var(--muted); font-size:13.5px;}
  .today-chip{font-size:12.5px; color:var(--ink-soft); background:var(--card); border:1px solid var(--paper-line); padding:6px 12px; border-radius:20px; box-shadow:var(--shadow);}

  /* Cards */
  .card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid #EFE9D8;}
  .grid-4{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;}
  .grid-5{display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:22px;}
  @media (max-width:1000px){ .grid-4,.grid-5{grid-template-columns:repeat(2,1fr);} }

  .balance-card{padding:18px 18px 16px; position:relative; overflow:hidden;}
  .balance-card .bar{position:absolute; left:0; top:0; bottom:0; width:5px;}
  .balance-card .cat-label{font-size:12px; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); font-weight:600; margin-bottom:8px;}
  .balance-card .amount{font-size:21px; font-weight:600;}
  .balance-card.total{background:var(--green); color:#fff;}
  .balance-card.total .cat-label{color:#CFE0CC;}
  .balance-card.total .amount{color:#fff;}

  .section-title{font-size:15px; font-weight:600; margin:28px 0 12px; display:flex; align-items:center; gap:8px;}
  .section-title .tag{font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); background:var(--paper); border:1px solid var(--paper-line); padding:2px 8px; border-radius:20px;}

  /* Forms */
  .form-card{padding:22px; margin-bottom:24px;}
  .form-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; align-items:end;}
  @media (max-width:900px){ .form-grid{grid-template-columns:repeat(2,1fr);} }
  .field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%; padding:9px 11px; border-radius:7px; border:1px solid #DCD5C0;
    font-family:'Inter',sans-serif; font-size:13.5px; background:#FCFAF4; color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--green); outline-offset:1px; background:#fff;}
  .field.money input{font-family:'IBM Plex Mono',monospace;}

  .btn{
    padding:9px 16px; border-radius:7px; border:none; cursor:pointer;
    font-size:13.5px; font-weight:600; font-family:'Inter',sans-serif;
    display:inline-flex; align-items:center; gap:6px; transition:filter .15s;
  }
  .btn:hover{filter:brightness(1.06);}
  .btn:active{filter:brightness(0.96);}
  .btn-primary{background:var(--green); color:#fff;}
  .btn-gold{background:var(--gold); color:#fff;}
  .btn-outline{background:#fff; color:var(--ink); border:1px solid #DCD5C0;}
  .btn-danger{background:transparent; color:var(--red); border:1px solid #E3C6C6;}
  .btn-sm{padding:5px 10px; font-size:12px; border-radius:6px;}

  /* Tables */
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.5px;
    color:var(--muted); font-weight:600; padding:10px 14px; border-bottom:1px solid var(--paper-line);
    white-space:nowrap;
  }
  td{padding:11px 14px; border-bottom:1px solid #F1ECDE; vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FCFAF2;}
  .table-wrap{overflow-x:auto;}
  .pill{font-size:11.5px; font-weight:600; padding:3px 9px; border-radius:20px; display:inline-block;}
  .pill.kas{background:var(--green-tint); color:var(--green);}
  .pill.komite{background:var(--gold-tint); color:#8A6D1D;}
  .pill.tabungan{background:var(--blue-tint); color:var(--blue);}
  .pill.dana_sosial{background:var(--red-tint); color:var(--red);}
  .amt-in{color:var(--green); font-weight:600;}
  .amt-out{color:var(--red); font-weight:600;}
  .empty-row td{text-align:center; color:var(--muted); padding:34px 14px; font-style:italic;}
  .row-actions{display:flex; gap:6px;}
  .icon-btn{width:28px;height:28px; border-radius:6px; border:1px solid #E3DCC8; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink-soft);}
  .icon-btn:hover{background:var(--paper);}
  .icon-btn.danger:hover{background:var(--red-tint); color:var(--red); border-color:#E3C6C6;}

  .filters{display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center;}
  .filters select, .filters input{padding:7px 10px; border-radius:7px; border:1px solid #DCD5C0; font-size:13px; background:#fff;}

  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;}

  /* Empty state / hints */
  .hint{font-size:12.5px; color:var(--muted); margin-top:6px;}
  .link-inline{color:var(--green); font-weight:600; cursor:pointer; text-decoration:underline;}

  /* Report specific */
  .report-controls{display:flex; gap:12px; flex-wrap:wrap; align-items:end; margin-bottom:20px;}
  .recap-summary{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;}
  @media (max-width:900px){ .recap-summary{grid-template-columns:repeat(2,1fr);} }
  .recap-box{padding:16px 18px;}
  .recap-box .label{font-size:11.5px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px;}
  .recap-box .value{font-size:19px; font-weight:600;}

  .bars{display:flex; flex-direction:column; gap:12px; padding:20px;}
  .bar-row{display:grid; grid-template-columns:120px 1fr 100px; align-items:center; gap:10px; font-size:13px;}
  .bar-track{height:10px; background:#EFEAD9; border-radius:6px; overflow:hidden; position:relative;}
  .bar-fill{height:100%; border-radius:6px;}

  .modal-overlay{position:fixed; inset:0; background:rgba(31,42,36,0.45); display:flex; align-items:center; justify-content:center; z-index:50;}
  .modal{background:#fff; border-radius:12px; padding:24px; width:380px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,0.25);}
  .modal h3{margin:0 0 8px; font-size:17px;}
  .modal p{font-size:13.5px; color:var(--ink-soft); margin:0 0 18px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px;}

  .toast{position:fixed; bottom:24px; right:24px; background:var(--green-dark); color:#fff; padding:12px 18px; border-radius:8px; font-size:13.5px; box-shadow:0 8px 24px rgba(0,0,0,0.2); z-index:60; opacity:0; transform:translateY(8px); transition:all .25s ease; pointer-events:none;}
  .toast.show{opacity:1; transform:translateY(0);}

  .student-chip-list{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;}
  .student-chip{display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--paper-line); padding:6px 8px 6px 12px; border-radius:20px; font-size:13px;}
  .student-chip button{background:none; border:none; cursor:pointer; color:var(--muted); width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .student-chip button:hover{background:var(--red-tint); color:var(--red);}

  .loading-note{color:var(--muted); font-size:13px; padding:20px;}

  .viewer-badge{display:inline-flex; align-items:center; gap:6px; background:rgba(184,145,47,0.22); color:var(--gold); font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; letter-spacing:0.3px; margin-top:2px;}
  .sidebar-link-btn{width:100%; text-align:left; background:rgba(239,233,216,0.08); border:1px solid rgba(239,233,216,0.16); color:#DCE3D2; font-size:12px; font-weight:600; padding:8px 10px; border-radius:7px; cursor:pointer; display:flex; align-items:center; gap:6px;}
  .sidebar-link-btn:hover{background:rgba(239,233,216,0.15); color:#fff;}
  .export-row{display:flex; gap:8px; flex-wrap:wrap;}

  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-thumb{background:#DCD5C0; border-radius:6px;}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">K</div>
      <h1>Buku Kas Kelas</h1>
      <p>Kas &middot; Komite &middot; Tabungan &middot; Sosial</p>
      <div id="brand-badge"></div>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-foot" id="sidebar-foot"></div>
  </aside>
  <main>
    <div class="page" id="page"></div>
  </main>
</div>
<div id="toast" class="toast"></div>
<div id="modal-root"></div>

<script>
/* ============================= CONSTANTS ============================= */
const CATEGORIES = [
  { key:'kas', label:'Kas Kelas', color:'#2F5233', tint:'#E7EEE4' },
  { key:'komite', label:'Komite', color:'#8A6D1D', tint:'#F7EFD9' },
  { key:'tabungan', label:'Tabungan', color:'#2B5F8A', tint:'#E7EEF3' },
  { key:'dana_sosial', label:'Dana Sosial', color:'#A63D40', tint:'#F5E7E3' },
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c=>[c.key,c]));

const ICONS = {
  dashboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>',
  income:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>',
  expense:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>',
  recap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>',
  student:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  download:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
  eye:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
  pdf:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="9" y1="11" x2="12" y2="11"/></svg>',
  lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
  upload:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
};

const NAV_ITEMS = [
  { key:'dashboard', label:'Dashboard', icon:'dashboard', viewerConfigurable:true },
  { key:'income', label:'Input Pemasukan', icon:'income', viewerConfigurable:false },
  { key:'expense', label:'Input Pengeluaran', icon:'expense', viewerConfigurable:false },
  { key:'recap', label:'Laporan Rekapitulasi', icon:'recap', viewerConfigurable:true },
  { key:'student', label:'Laporan per Siswa', icon:'student', viewerConfigurable:true },
  { key:'settings', label:'Pengaturan Siswa', icon:'settings', viewerConfigurable:false },
  { key:'export', label:'Data Mentah & Export', icon:'download', viewerConfigurable:true },
  { key:'access', label:'Pengaturan Akses', icon:'lock', adminOnly:true },
];
const VIEWER_CONFIGURABLE_PAGES = NAV_ITEMS.filter(i=>i.viewerConfigurable).map(i=>i.key);
const DEFAULT_VIEWER_PAGES = ['dashboard','recap','student'];
const DEFAULT_ADMIN_PASSCODE = 'admin123';

/* ============================= ROLE / LOGIN ============================= */
let currentRole = 'viewer'; // 'viewer' (default, read-only) or 'admin' (unlocked via login)
let APP_SETTINGS = { adminPasscode: DEFAULT_ADMIN_PASSCODE, viewerPages: DEFAULT_VIEWER_PAGES.slice() };

function getVisibleNavItems(){
  if(currentRole==='admin') return NAV_ITEMS;
  const allowed = (APP_SETTINGS.viewerPages && APP_SETTINGS.viewerPages.length) ? APP_SETTINGS.viewerPages : DEFAULT_VIEWER_PAGES;
  return NAV_ITEMS.filter(i=> i.viewerConfigurable && allowed.includes(i.key));
}
function isPageAllowedForCurrentRole(pageKey){
  return getVisibleNavItems().some(i=>i.key===pageKey);
}
function doLogout(){
  currentRole = 'viewer';
  currentPage = 'dashboard';
  showToast('Kembali ke mode Viewer.');
  render();
}
function showLoginModal(){
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" id="overlay">
      <div class="modal">
        <h3>Masuk sebagai Admin</h3>
        <p>Admin dapat mengelola pemasukan, pengeluaran, daftar siswa, dan mengatur apa saja yang boleh dilihat Viewer.</p>
        <form id="login-form">
          <div class="field" style="margin-bottom:6px;">
            <label>Kata Sandi Admin</label>
            <input type="password" name="passcode" autocomplete="off" required autofocus>
          </div>
          <div class="hint" style="margin-bottom:16px;">Kata sandi default: <b>admin123</b> (bisa diubah nanti di Pengaturan Akses).</div>
          <div class="modal-actions">
            <button type="button" class="btn btn-outline" id="cancel-login">Batal</button>
            <button type="submit" class="btn btn-primary">Masuk</button>
          </div>
        </form>
      </div>
    </div>`;
  document.getElementById('cancel-login').addEventListener('click', ()=> root.innerHTML='');
  document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') root.innerHTML=''; });
  document.getElementById('login-form').addEventListener('submit', (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const entered = (fd.get('passcode')||'').toString();
    const expected = APP_SETTINGS.adminPasscode || DEFAULT_ADMIN_PASSCODE;
    if(entered === expected){
      currentRole = 'admin';
      root.innerHTML = '';
      showToast('Berhasil masuk sebagai Admin.');
      render();
    } else {

}

/* ============================= STATE ============================= */
let STATE = {
  students: [],
  income: [],
  expense: [],
  loaded: false,
};
let currentPage = 'dashboard';

/* ============================= STORAGE HELPERS ============================= */
async function loadAll(){
  try{
    const [s, inc, exp, settings] = await Promise.all([
      safeGet('students'), safeGet('income'), safeGet('expense'), safeGet('app_settings')
    ]);
    STATE.students = s ? JSON.parse(s) : [];
    STATE.income = inc ? JSON.parse(inc) : [];
    STATE.expense = exp ? JSON.parse(exp) : [];
    if(settings){
      try{
        const parsed = JSON.parse(settings);
        APP_SETTINGS = {
          adminPasscode: parsed.adminPasscode || DEFAULT_ADMIN_PASSCODE,
          viewerPages: Array.isArray(parsed.viewerPages) ? parsed.viewerPages : DEFAULT_VIEWER_PAGES.slice(),
        };
      }catch(e){ console.error('Parse app_settings error', e); }
    }
  }catch(e){
    console.error('Load error', e);
  }
  STATE.loaded = true;
}
async function safeGet(key){
  try{
    const r = await window.storage.get(key, true);
    return r ? r.value : null;
  }catch(e){
    return null;
  }
}
async function saveKey(key, value){
  try{
    const r = await window.storage.set(key, JSON.stringify(value), true);
    if(!r) throw new Error('no result');
    return true;
  }catch(e){
    console.error('Save error', key, e);
    showToast('Gagal menyimpan data. Coba lagi.');
    return false;
  }
}

/* ============================= GLOBAL ERROR BANNER ============================= */
function showFatalError(msg){
  let banner = document.getElementById('fatal-error-banner');
  if(!banner){
    banner = document.createElement('div');
    banner.id = 'fatal-error-banner';
    banner.style.cssText = 'position:fixed; top:0; left:0; right:0; background:#A63D40; color:#fff; padding:10px 16px; font-size:12.5px; z-index:999; text-align:center; font-family:Inter,sans-serif;';
    document.body.appendChild(banner);
  }
  banner.textContent = '⚠ Terjadi kesalahan pada aplikasi: ' + msg + ' — coba muat ulang halaman. Jika berulang, laporkan pesan ini.';
}
window.addEventListener('error', (e)=>{ try{ showFatalError(e.message||'unknown error'); }catch(_){} });
window.addEventListener('unhandledrejection', (e)=>{ try{ showFatalError((e.reason&&e.reason.message)||'unhandled promise rejection'); }catch(_){} });

/* ============================= UTIL ============================= */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function formatRupiah(n){
  n = Number(n)||0;
  return 'Rp ' + n.toLocaleString('id-ID', {maximumFractionDigits:0});
}
function formatDateID(d){
  if(!d) return '-';
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
}
function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}
function monthName(m){
  const names = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  return names[m];
}
function studentName(id){
  const s = STATE.students.find(x=>x.id===id);
  return s ? s.name : '(siswa dihapus)';
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 2400);
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function describeTxParty(r){
  if(r.type==='in'){
    return escapeHtml(studentName(r.studentId));
  }
  // expense
  if(r.category==='tabungan' && r.studentId){
    const name = escapeHtml(studentName(r.studentId));
    return r.note ? `Penarikan &mdash; ${name} <span style="color:var(--muted)">(${escapeHtml(r.note)})</span>` : `Penarikan &mdash; ${name}`;
  }
  return r.note ? escapeHtml(r.note) : '<span style="color:var(--muted)">—</span>';
}

/* ============================= BALANCE CALCULATIONS ============================= */
function getCategoryTotals(catKey, upToDateExclusive){
  // returns {income, expense, balance} filtering optionally by date < upToDateExclusive
  let inc = STATE.income.filter(r => r.category===catKey && (!upToDateExclusive || r.date < upToDateExclusive));
  let exp = STATE.expense.filter(r => r.category===catKey && (!upToDateExclusive || r.date < upToDateExclusive));
  const incSum = inc.reduce((a,b)=>a+Number(b.amount||0),0);
  const expSum = exp.reduce((a,b)=>a+Number(b.amount||0),0);
  return { income:incSum, expense:expSum, balance: incSum-expSum };
}
function getCurrentBalance(catKey){
  return getCategoryTotals(catKey, null).balance;
}
function getTotalBalance(){
  return CATEGORIES.reduce((sum,c)=>sum+getCurrentBalance(c.key),0);
}

/* ============================= RENDER ROOT ============================= */
function renderNav(){
  const nav = document.getElementById('nav');
  const items = getVisibleNavItems();
  nav.innerHTML = items.map(item=>`

    </button>
  `).join('');
  nav.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click', ()=>{ currentPage = btn.dataset.page; render(); });
  });

  const badge = document.getElementById('brand-badge');
  badge.innerHTML = currentRole==='admin'
    ? `<div class="viewer-badge" style="background:rgba(184,145,47,0.22); color:var(--gold);">${ICONS.lock.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" width="12" height="12"')} Admin</div>`
    : `<div class="viewer-badge">${ICONS.eye.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" width="13" height="13"')} Viewer</div>`;

  const foot = document.getElementById('sidebar-foot');

      <button class="sidebar-link-btn" id="logout-btn" style="margin-top:10px;">Keluar (jadi Viewer)</button>`;

      <button class="sidebar-link-btn" id="login-btn" style="margin-top:10px;">${ICONS.lock.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" width="13" height="13"')} Masuk sebagai Admin</button>`;

}

function render(){
  try{
    if(!isPageAllowedForCurrentRole(currentPage)){
      currentPage = 'dashboard';
    }
    renderNav();
    const page = document.getElementById('page');
    if(!STATE.loaded){
      page.innerHTML = '<div class="loading-note">Memuat data...</div>';
      return;
    }
    switch(currentPage){
      case 'dashboard': page.innerHTML = renderDashboard(); break;
      case 'income': page.innerHTML = renderIncomePage(); attachIncomeHandlers(); break;
      case 'expense': page.innerHTML = renderExpensePage(); attachExpenseHandlers(); break;
      case 'recap': page.innerHTML = renderRecapPage(); attachRecapHandlers(); break;
      case 'student': page.innerHTML = renderStudentPage(); attachStudentHandlers(); break;
      case 'settings': page.innerHTML = renderSettingsPage(); attachSettingsHandlers(); break;
      case 'export': page.innerHTML = renderExportPage(); attachExportHandlers(); break;
      case 'access': page.innerHTML = renderAccessPage(); attachAccessHandlers(); break;
    }
    if(currentPage==='dashboard') attachDashboardHandlers();
  }catch(err){
    console.error('Render error', err);
    showFatalError(err.message || 'gagal merender halaman');
  }
}

/* ============================= DASHBOARD ============================= */
function renderDashboard(){
  const total = getTotalBalance();
  const cards = CATEGORIES.map(c=>{
    const bal = getCurrentBalance(c.key);
    return `<div class="card balance-card">
      <div class="bar" style="background:${c.color}"></div>
      <div class="cat-label">${c.label}</div>
      <div class="amount num">${formatRupiah(bal)}</div>
    </div>`;
  }).join('');

  const maxAbs = Math.max(1, ...CATEGORIES.map(c=>Math.abs(getCurrentBalance(c.key))), total);
  const bars = CATEGORIES.map(c=>{
    const bal = getCurrentBalance(c.key);
    const pct = Math.max(2, Math.round(Math.abs(bal)/maxAbs*100));
    return `<div class="bar-row">
      <div>${c.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${c.color}"></div></div>
      <div class="num" style="text-align:right; font-weight:600;">${formatRupiah(bal)}</div>
    </div>`;
  }).join('');

  const allTx = [
    ...STATE.income.map(r=>({...r, type:'in'})),
    ...STATE.expense.map(r=>({...r, type:'out'})),
  ].sort((a,b)=> b.date.localeCompare(a.date) || 0).slice(0,10);

  const rows = allTx.length ? allTx.map(r=>`
    <tr>
      <td>${formatDateID(r.date)}</td>
      <td><span class="pill ${r.category}">${CAT_MAP[r.category].label}</span></td>
      <td>${describeTxParty(r)}</td>
      <td style="text-align:right" class="${r.type==='in'?'amt-in':'amt-out'} num">${r.type==='in'?'+':'-'} ${formatRupiah(r.amount)}</td>
    </tr>
  `).join('') : `<tr class="empty-row"><td colspan="4">Belum ada transaksi. Mulai dengan menambah pemasukan atau pengeluaran.</td></tr>`;

  return `
    <div class="page-head">
      <div>
        <h2>Dashboard</h2>
        <div class="sub">Rekapitulasi saldo kas kelas secara keseluruhan</div>
      </div>
      <div class="today-chip">${formatDateID(todayStr())}</div>
    </div>

    <div class="grid-5">
      ${cards}
      <div class="card balance-card total">
        <div class="cat-label">Total Saldo</div>
        <div class="amount num">${formatRupiah(total)}</div>
      </div>
    </div>

    <div class="section-title">Perbandingan Saldo per Kategori</div>
    <div class="card bars">${bars}</div>

    <div class="section-title">
      Transaksi Terbaru <span class="tag">10 Terakhir</span>
    </div>
    <div class="card table-wrap">
      <table>
        <thead><tr><th>Tanggal</th><th>Kategori</th><th>Siswa / Keterangan</th><th style="text-align:right">Nominal</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

/* ============================= RECAP PAGE ============================= */
let recapState = { periodType:'bulanan', month: (new Date()).getMonth(), year:(new Date()).getFullYear(), category:'all' };

function getYearsAvailable(){
  const years = new Set([recapState.year]);
  [...STATE.income, ...STATE.expense].forEach(r=> years.add(Number(r.date.slice(0,4))));
  return Array.from(years).sort((a,b)=>b-a);
}

function computeRecap(){
  const catsToShow = recapState.category==='all' ? CATEGORIES.map(c=>c.key) : [recapState.category];
  let periodStart, periodEndExclusive, label;
  if(recapState.periodType==='bulanan'){
    const m = recapState.month, y = recapState.year;
    periodStart = `${y}-${String(m+1).padStart(2,'0')}-01`;
    const nextM = m===11? {y:y+1,m:0} : {y:y,m:m+1};
    periodEndExclusive = `${nextM.y}-${String(nextM.m+1).padStart(2,'0')}-01`;
    label = `${monthName(m)} ${y}`;
  } else {
    const y = recapState.year;
    periodStart = `${y}-01-01`;
    periodEndExclusive = `${y+1}-01-01`;
    label = `Tahun ${y}`;
  }
  const perCat = catsToShow.map(key=>{
    const before = getCategoryTotals(key, periodStart).balance;
    const inc = STATE.income.filter(r=>r.category===key && r.date>=periodStart && r.date<periodEndExclusive).reduce((a,b)=>a+Number(b.amount),0);
    const exp = STATE.expense.filter(r=>r.category===key && r.date>=periodStart && r.date<periodEndExclusive).reduce((a,b)=>a+Number(b.amount),0);
    return { key, label: CAT_MAP[key].label, color: CAT_MAP[key].color, saldoAwal: before, pemasukan: inc, pengeluaran: exp, saldoAkhir: before+inc-exp };
  });
  const totals = perCat.reduce((acc,c)=>({
    saldoAwal: acc.saldoAwal+c.saldoAwal, pemasukan: acc.pemasukan+c.pemasukan,
    pengeluaran: acc.pengeluaran+c.pengeluaran, saldoAkhir: acc.saldoAkhir+c.saldoAkhir
  }), {saldoAwal:0, pemasukan:0, pengeluaran:0, saldoAkhir:0});
  return { label, perCat, totals, periodStart, periodEndExclusive };
}

function renderRecapPage(){
  const years = getYearsAvailable();
  const recap = computeRecap();
  const monthOpts = Array.from({length:12},(_,m)=>`<option value="${m}" ${recapState.month===m?'selected':''}>${monthName(m)}</option>`).join('');
  const yearOpts = years.map(y=>`<option value="${y}" ${recapState.year===y?'selected':''}>${y}</option>`).join('');
  const catOpts = `<option value="all" ${recapState.category==='all'?'selected':''}>Semua Kategori</option>` + CATEGORIES.map(c=>`<option value="${c.key}" ${recapState.category===c.key?'selected':''}>${c.label}</option>`).join('');

  const perCatRows = recap.perCat.map(c=>`
    <tr>
      <td><span class="pill" style="background:${c.color}22; color:${c.color}">${c.label}</span></td>
      <td class="num" style="text-align:right">${formatRupiah(c.saldoAwal)}</td>
      <td class="num amt-in" style="text-align:right">${formatRupiah(c.pemasukan)}</td>

      <td class="num" style="text-align:right; font-weight:700;">${formatRupiah(c.saldoAkhir)}</td>
    </tr>
  `).join('');

  return `
    <div class="page-head">
      <div><h2>Laporan Rekapitulasi Saldo</h2><div class="sub">Ringkasan saldo bulanan maupun tahunan per kategori atau keseluruhan</div></div>
    </div>

    <div class="report-controls card" style="padding:16px 18px;">
      <div class="field">

        <select id="rc-period">
          <option value="bulanan" ${recapState.periodType==='bulanan'?'selected':''}>Bulanan</option>
          <option value="tahunan" ${recapState.periodType==='tahunan'?'selected':''}>Tahunan</option>
        </select>
      </div>
      ${recapState.periodType==='bulanan' ? `<div class="field"><label>Bulan</label><select id="rc-month">${monthOpts}</select></div>` : ''}
      <div class="field">
        <label>Tahun</label>
        <select id="rc-year">${yearOpts}</select>
      </div>
      <div class="field">
        <label>Kategori</label>
        <select id="rc-category">${catOpts}</select>
      </div>
      <div class="export-row">
        <button class="btn btn-gold" id="rc-export">${ICONS.download} Excel</button>
        <button class="btn btn-outline" id="rc-export-pdf">${ICONS.pdf} PDF</button>

    </div>

    <div class="section-title">Ringkasan Periode: ${recap.label}</div>
    <div class="recap-summary">
      <div class="card recap-box"><div class="label">Saldo Awal</div><div class="value num">${formatRupiah(recap.totals.saldoAwal)}</div></div>
      <div class="card recap-box"><div class="label" style="color:var(--green)">Total Pemasukan</div><div class="value num" style="color:var(--green)">${formatRupiah(recap.totals.pemasukan)}</div></div>

function exportRecapPDF(){
  const recap = computeRecap();

  doc.autoTable({
    startY:29,
    head:[['Kategori','Saldo Awal','Pemasukan','Pengeluaran','Saldo Akhir']],
    body:[
      ...recap.perCat.map(c=>[c.label, formatRupiah(c.saldoAwal), formatRupiah(c.pemasukan), formatRupiah(c.pengeluaran), formatRupiah(c.saldoAkhir)]),
      ['TOTAL', formatRupiah(recap.totals.saldoAwal), formatRupiah(recap.totals.pemasukan), formatRupiah(recap.totals.pengeluaran), formatRupiah(recap.totals.saldoAkhir)],
    ],

      }
    }
  });
  doc.save(`Rekap_${recap.label.replace(/\s+/g,'_')}.pdf`);
  showToast('Laporan rekapitulasi (PDF) diunduh.');
}

  const penarikan = STATE.expense.filter(r=>r.studentId===studentId && r.category==='tabungan').reduce((a,b)=>a+Number(b.amount),0);

  `).join('') || `<div class="hint">Belum ada siswa. Tambahkan nama pertama menggunakan formulir di atas.</div>`;

  return `
    <div class="page-head">
      <div><h2>Pengaturan Siswa</h2><div class="sub">Kelola daftar nama siswa yang muncul pada form pemasukan</div></div>
    </div>

      <form id="student-form" style="display:flex; gap:10px; align-items:end;">
        <div class="field" style="flex:1;">
          <label>Nama Siswa Baru <span style="font-weight:400; color:var(--muted);">(pisahkan dengan tanda titik koma <b>;</b> untuk menambah beberapa sekaligus)</span></label>
          <input type="text" name="names" placeholder="cth. Ahmad Fauzan; Siti Aminah; Budi Santoso" required>
        </div>
        <button type="submit" class="btn btn-primary">${ICONS.plus} Tambah</button>

        <button type="button" class="btn btn-outline btn-sm" id="import-excel-btn">${ICONS.upload} Impor dari Excel</button>
        <input type="file" id="import-excel-input" accept=".xlsx,.xls,.csv" style="display:none;">
        <span class="hint">File Excel/CSV dengan kolom nama siswa (kolom pertama, atau kolom berjudul "Nama"/"Nama Siswa").</span>

      <div class="student-chip-list">${list}</div>

function parseNamesFromSheetRows(rows){
  if(!rows || !rows.length) return [];
  let colIdx = 0;
  let startRow = 0;
  const header = (rows[0]||[]).map(c=>String(c==null?'':c).toLowerCase());
  const foundIdx = header.findIndex(h=>h.includes('nama'));
  if(foundIdx>-1){ colIdx = foundIdx; startRow = 1; }
  const names = [];
  for(let i=startRow;i<rows.length;i++){
    const row = rows[i];
    if(!row) continue;
    const val = row[colIdx];
    const name = (val===undefined || val===null) ? '' : String(val).trim();
    if(name) names.push(name);
  }
  return names;
}

async function bulkAddStudents(rawNames){
  const existingLower = new Set(STATE.students.map(s=>s.name.toLowerCase()));
  const seenThisBatch = new Set();
  let added = 0, skipped = 0;
  rawNames.forEach(raw=>{
    const name = String(raw||'').trim();
    if(!name) return;
    const key = name.toLowerCase();
    if(existingLower.has(key) || seenThisBatch.has(key)){ skipped++; return; }
    STATE.students.push({ id: uid(), name });
    existingLower.add(key);
    seenThisBatch.add(key);
    added++;
  });
  if(added>0){
    const ok = await saveKey('students', STATE.students);
    if(ok){
      showToast(`${added} siswa ditambahkan${skipped>0 ? `, ${skipped} nama duplikat dilewati` : ''}.`);
    }
  } else {
    showToast(skipped>0 ? 'Semua nama sudah ada di daftar (dilewati).' : 'Tidak ada nama valid untuk ditambahkan.');
  }
  render();
}

function attachSettingsHandlers(){
  const form = document.getElementById('student-form');
  if(form) form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const fd = new FormData(form);
    const raw = (fd.get('names')||'').toString();
    const parts = raw.split(/;|\n/).map(s=>s.trim()).filter(Boolean);
    if(!parts.length){ showToast('Isi nama siswa terlebih dahulu.'); return; }
    await bulkAddStudents(parts);
  });

  const importBtn = document.getElementById('import-excel-btn');
  const importInput = document.getElementById('import-excel-input');
  if(importBtn && importInput){
    importBtn.addEventListener('click', ()=> importInput.click());
    importInput.addEventListener('change', async (e)=>{
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      try{
        const data = await file.arrayBuffer();
        const wb = XLSX.read(data, { type:'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header:1 });
        const names = parseNamesFromSheetRows(rows);
        if(!names.length){
          showToast('Tidak ditemukan nama siswa pada file ini.');
        } else {
          await bulkAddStudents(names);
        }
      }catch(err){
        console.error('Import excel error', err);
        showToast('Gagal membaca file. Pastikan formatnya .xlsx, .xls, atau .csv yang valid.');
      } finally {
        importInput.value = '';
      }
    });
  }

  document.getElementById('page').querySelectorAll('[data-edit-student]').forEach(btn=>{
    btn.addEventListener('click', ()=> openEditStudentModal(btn.dataset.editStudent));
  });
  document.getElementById('page').querySelectorAll('[data-del-student]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.delStudent;
      const usedIncome = STATE.income.filter(r=>r.studentId===id).length;
      const usedWithdraw = STATE.expense.filter(r=>r.studentId===id && r.category==='tabungan').length;
      const usedCount = usedIncome + usedWithdraw;
      const root = document.getElementById('modal-root');
      root.innerHTML = `
        <div class="modal-overlay" id="overlay">
          <div class="modal">
            <h3>Hapus siswa ini?</h3>
            <p>${usedCount>0 ? `Siswa ini memiliki ${usedIncome} catatan pemasukan dan ${usedWithdraw} catatan penarikan tabungan. Data transaksi lama akan tetap ada namun akan tertulis sebagai "(siswa dihapus)".` : 'Siswa ini belum memiliki catatan transaksi.'}</p>
            <div class="modal-actions">
              <button class="btn btn-outline" id="cancel-del">Batal</button>
              <button class="btn" id="confirm-del" style="background:var(--red); color:#fff;">Hapus</button>
            </div>
          </div>
        </div>`;
      document.getElementById('cancel-del').addEventListener('click', ()=> root.innerHTML='');
      document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') root.innerHTML=''; });
      document.getElementById('confirm-del').addEventListener('click', async ()=>{
        STATE.students = STATE.students.filter(s=>s.id!==id);
        const ok = await saveKey('students', STATE.students);
        root.innerHTML='';
        if(ok) showToast('Siswa dihapus.');
        render();
      });
    });
  });
}

function openEditStudentModal(id){
  const rec = STATE.students.find(s=>s.id===id);
  if(!rec) return;
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" id="overlay">
      <div class="modal">
        <h3>Ubah Nama Siswa</h3>
        <form id="edit-student-form">
          <div class="field" style="margin-bottom:16px;">
            <label>Nama Siswa</label>
            <input type="text" name="name" value="${escapeHtml(rec.name)}" required>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-outline" id="cancel-edit">Batal</button>
            <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
          </div>
        </form>
      </div>
    </div>
  `;
  document.getElementById('cancel-edit').addEventListener('click', ()=> root.innerHTML='');
  document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') root.innerHTML=''; });
  document.getElementById('edit-student-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const newName = (fd.get('name')||'').trim();
    if(!newName){ showToast('Nama tidak boleh kosong.'); return; }
    const dup = STATE.students.some(s=>s.id!==id && s.name.toLowerCase()===newName.toLowerCase());
    if(dup){ showToast('Nama siswa sudah ada di daftar.'); return; }
    rec.name = newName;
    const ok = await saveKey('students', STATE.students);
    root.innerHTML='';
    if(ok) showToast('Nama siswa diperbarui.');
    render();
  });
}

function exportAllExcel(){
  const wb = XLSX.utils.book_new();

  // Sheet 1: Pemasukan
  const incRows = [['Tanggal','Kategori','Nama Siswa','Nominal']];
  STATE.income.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    incRows.push([r.date, CAT_MAP[r.category].label, studentName(r.studentId), Number(r.amount)]);
  });
  const wsInc = XLSX.utils.aoa_to_sheet(incRows);
  wsInc['!cols'] = [{wch:12},{wch:14},{wch:24},{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsInc, 'Pemasukan');

  // Sheet 2: Pengeluaran
  const expRows = [['Tanggal','Kategori','Nama Siswa (Penarikan Tabungan)','Keterangan','Nominal']];
  STATE.expense.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    expRows.push([r.date, CAT_MAP[r.category].label, (r.category==='tabungan' && r.studentId) ? studentName(r.studentId) : '', r.note||'', Number(r.amount)]);
  });
  const wsExp = XLSX.utils.aoa_to_sheet(expRows);
  wsExp['!cols'] = [{wch:12},{wch:14},{wch:24},{wch:26},{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsExp, 'Pengeluaran');

  // Sheet 3: Rekap Saldo (keseluruhan, current)
  const rekapRows = [['Kategori','Total Pemasukan','Total Pengeluaran','Saldo Saat Ini']];
  CATEGORIES.forEach(c=>{
    const t = getCategoryTotals(c.key, null);
    rekapRows.push([c.label, t.income, t.expense, t.balance]);
  });
  const totIn = STATE.income.reduce((a,b)=>a+Number(b.amount),0);
  const totExp = STATE.expense.reduce((a,b)=>a+Number(b.amount),0);
  rekapRows.push(['TOTAL', totIn, totExp, totIn-totExp]);
  const wsRekap = XLSX.utils.aoa_to_sheet(rekapRows);
  wsRekap['!cols'] = [{wch:16},{wch:18},{wch:18},{wch:18}];
  XLSX.utils.book_append_sheet(wb, wsRekap, 'Rekap Saldo');

  // Sheet 4: Daftar Siswa + total kontribusi & saldo tabungan
  const stuRows = [['Nama Siswa','Kas','Komite','Setoran Tabungan','Penarikan Tabungan','Saldo Tabungan','Dana Sosial','Total Setoran (Kotor)']];
  STATE.students.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(s=>{
    const recs = STATE.income.filter(r=>r.studentId===s.id);
    const total = recs.reduce((a,b)=>a+Number(b.amount),0);
    const kas = recs.filter(r=>r.category==='kas').reduce((a,b)=>a+Number(b.amount),0);
    const komite = recs.filter(r=>r.category==='komite').reduce((a,b)=>a+Number(b.amount),0);
    const sosial = recs.filter(r=>r.category==='dana_sosial').reduce((a,b)=>a+Number(b.amount),0);
    const tab = getStudentTabunganNet(s.id);
    stuRows.push([s.name, kas, komite, tab.setoran, tab.penarikan, tab.saldo, sosial, total]);
  });
  const wsStu = XLSX.utils.aoa_to_sheet(stuRows);
  wsStu['!cols'] = [{wch:24},{wch:13},{wch:13},{wch:15},{wch:16},{wch:14},{wch:13},{wch:16}];
  XLSX.utils.book_append_sheet(wb, wsStu, 'Siswa');

  XLSX.writeFile(wb, `Data_Kas_Kelas_${todayStr()}.xlsx`);
  showToast('File Excel berhasil diunduh.');
}

function attachAccessHandlers(){

    APP_SETTINGS.viewerPages = checked;
    const ok = await saveKey('app_settings', APP_SETTINGS);
    if(ok) showToast('Pengaturan akses Viewer disimpan.');
    render();
  });

  const passForm = document.getElementById('passcode-form');
  if(passForm) passForm.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const fd = new FormData(passForm);

    const ok = await saveKey('app_settings', APP_SETTINGS);
    if(ok) showToast('Kata sandi Admin diperbarui.');
    passForm.reset();
  });
}
